spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: newstickr

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/newstickr?characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jwt:
    secret: ${SPRING_JWT_SECRET:}

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_OAUTH_CLIENT_ID:}
            client-secret: ${NAVER_OAUTH_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8085}

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads/profile/}

api:
  naver:
    clientId: ${NAVER_API_CLIENT_ID:}
    clientSecret: ${NAVER_API_CLIENT_SECRET:}
    naverApiUrl: ${NAVER_NEWS_API_URL:https://openapi.naver.com/v1/search/news.json}
  grog:
    apiKey: ${GROQ_API_KEY:}
    grogApiUrl: ${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.newstickr.newstickr: DEBUG
